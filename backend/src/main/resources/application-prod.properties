# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# Set DB_URL, DB_USERNAME, DB_PASSWORD as environment variables (e.g. via ECS task definition or Elastic Beanstalk env config)

# CORS — set to frontend URL, or leave empty if handled by ALB/CloudFront
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false

# SQS — credentials come from the ECS task IAM role; no endpoint override needed
parking.sqs.relocation-queue=${SQS_QUEUE_NAME:parking-relocation}
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
spring.cloud.aws.sqs.endpoint=
spring.cloud.aws.credentials.access-key=
spring.cloud.aws.credentials.secret-key=
