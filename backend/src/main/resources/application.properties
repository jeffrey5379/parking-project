spring.application.name=parking-lot-service
server.port=${PORT:8080}

spring.jackson.serialization.indent-output=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Local dev defaults (H2). Overridden by application-prod.properties in production.
spring.datasource.url=jdbc:h2:file:./data/parking
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS — local dev: allow Vite dev server
cors.allowed-origins=http://localhost:5173

# SQS — local dev via ElasticMQ
parking.sqs.relocation-queue=parking-relocation
spring.cloud.aws.sqs.endpoint=http://localhost:9324
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.credentials.access-key=x
spring.cloud.aws.credentials.secret-key=x
